<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V7 Padel Antalya — Tournament Calendar 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#eef2f7;color:#1a1a2e;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#0d2137 0%,#1a4a7a 55%,#2471a3 100%);color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(13,33,55,.4)}
.header h1{font-size:1.6rem;font-weight:800}
.header p{font-size:.85rem;opacity:.7;margin-top:3px}

/* MONTH TABS */
.month-nav{display:flex;background:#fff;border-bottom:2px solid #dde5ef;padding:0 24px;gap:0}
.m-tab{padding:13px 26px;font-size:.88rem;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;color:#667;letter-spacing:.3px;transition:all .2s;margin-bottom:-2px}
.m-tab:hover{color:#1a4a7a;background:#f5f9ff}
.m-tab.active{color:#1a4a7a;border-bottom-color:#1a4a7a;background:#f0f6ff}

/* LEGEND */
.legend{display:flex;gap:0;background:#fff;border-bottom:1px solid #e8edf5;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:8px;padding:9px 18px;font-size:.76rem;font-weight:700;border-right:1px solid #eef;letter-spacing:.3px}
.leg:last-child{border-right:none}
.ldot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
.lr{background:#27ae60}.ln{background:#e67e22}.ls{background:#8e44ad}.lc{background:#e67e22;background:linear-gradient(135deg,#e8a000,#f39c12)}

/* MAIN */
.main{padding:20px 24px;max-width:1600px;margin:0 auto}

/* CALENDAR */
.cal-wrap{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 28px rgba(13,33,55,.11)}
.day-names{display:grid;grid-template-columns:repeat(7,1fr);background:#0d2137}
.dn{text-align:center;padding:12px 2px;font-size:.72rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#fff;border-right:1px solid rgba(255,255,255,.08)}
.dn:last-child{border-right:none}
.dn.wk{background:rgba(255,255,255,.07)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}

.cell{border-right:1px solid #dde5ef;border-bottom:1px solid #dde5ef;padding:7px 5px 9px;background:#fff;min-height:155px;position:relative;vertical-align:top}
.cell:nth-child(7n){border-right:none}
.cell.empty{background:#f5f8fc}
.cell.wknd{background:#fafbff}
.cell:not(.empty):hover{background:#f5f9ff}
.cell.camp-day{background:#fffbf0 !important}

/* Camp banner */
.camp-tag{background:linear-gradient(90deg,#f39c12,#e67e22);color:#fff;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.5px;margin-bottom:4px;display:inline-block}

.dnum{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:800;color:#0d2137;margin-bottom:5px}

/* EVENTS */
.ev{border-radius:4px;padding:3px 6px 3px;margin-bottom:3px;font-size:.68rem;font-weight:600;cursor:pointer;transition:all .15s;border-left:3px solid transparent;display:flex;flex-direction:column;gap:1px;line-height:1.2}
.ev:hover{filter:brightness(.9);transform:translateX(2px)}
.ev.rated{background:#d4efdf;color:#1a6630;border-left-color:#27ae60}
.ev.nonrated{background:#fde8d0;color:#a04000;border-left-color:#e67e22}
.ev.special{background:#ead6f8;color:#5b1a8a;border-left-color:#8e44ad}
.ev.camp{background:#fef3d0;color:#7d4e00;border-left-color:#f39c12}
.ev-t{font-size:.6rem;opacity:.65;font-weight:500}
.ev-n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* STATS */
.stats{display:flex;justify-content:center;gap:10px;padding:14px 24px;background:#fff;border-top:1px solid #dde5ef;flex-wrap:wrap}
.stat{text-align:center;padding:8px 18px;border-radius:10px;min-width:100px}
.stat-n{font-size:1.4rem;font-weight:900}
.stat-l{font-size:.67rem;font-weight:700;opacity:.6;margin-top:1px;letter-spacing:.3px;text-transform:uppercase}
.s0{background:#e8f1fb;color:#0d2137}.s1{background:#d4efdf;color:#1a6630}
.s2{background:#fde8d0;color:#a04000}.s3{background:#ead6f8;color:#5b1a8a}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:16px;max-width:450px;width:100%;box-shadow:0 24px 80px rgba(0,0,0,.3);overflow:hidden;animation:pop .18s ease}
@keyframes pop{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
.mhead{padding:18px 22px 14px;border-bottom:1px solid #eef;position:relative}
.mbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:.7rem;font-weight:800;letter-spacing:.3px;text-transform:uppercase;margin-bottom:9px}
.mb-rated{background:#d4efdf;color:#1a6630}
.mb-nonrated{background:#fde8d0;color:#a04000}
.mb-special{background:#ead6f8;color:#5b1a8a}
.mb-camp{background:#fef3d0;color:#7d4e00}
.mtitle{font-size:1.12rem;font-weight:800;color:#0d2137;line-height:1.3}
.mclose{position:absolute;top:14px;right:16px;background:#f0f0f0;border:none;width:28px;height:28px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#555}
.mclose:hover{background:#ddd}
.mbody{padding:16px 22px 20px;display:flex;flex-direction:column;gap:9px}
.mrow{display:flex;align-items:flex-start;gap:10px;font-size:.86rem;color:#333}
.mico{font-size:1rem;width:22px;text-align:center;flex-shrink:0;margin-top:1px}
.mval{line-height:1.45}.mval strong{color:#0d2137}
.mdesc{background:#f7f9fc;border-radius:9px;padding:11px 13px;font-size:.8rem;color:#445;line-height:1.6;border-left:3px solid #2471a3;margin-top:2px}

@media(max-width:860px){
  .main{padding:8px}
  .cell{min-height:100px;padding:4px 3px}
  .ev{font-size:.6rem;padding:2px 4px}
  .ev-t{display:none}
  .header h1{font-size:1.1rem}
  .m-tab{padding:10px 14px;font-size:.78rem}
}
</style>

const WDAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
let curMonth = 4;

function evType(key){ return (T[key]&&T[key].type)||'nonrated'; }
function evClass(type){ return type==='camp'?'camp':type; }

function renderMonth(m){
  const cfg = MONTHS[m];
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const byDay = {};
  (EVENTS[m]||[]).forEach(e=>{ (byDay[e.d]=byDay[e.d]||[]).push(e); });

  // empty cells before day 1
  for(let i=0;i<cfg.firstDOW;i++){
    const c=document.createElement('div');
    c.className='cell empty';
    grid.appendChild(c);
  }

  for(let d=1;d<=cfg.days;d++){
    const dow=(cfg.firstDOW+d-1)%7;
    const isWk=dow>=5;
    const isCamp=cfg.campDays&&cfg.campDays.includes(d);
    const cell=document.createElement('div');
    cell.className='cell'+(isWk?' wknd':'')+(isCamp?' camp-day':'');

    // Camp tag
    if(isCamp){
      const tag=document.createElement('div');
      tag.className='camp-tag';
      tag.textContent='⛺ BOB\'S CAMP';
      cell.appendChild(tag);
    }

    // Day number
    const dn=document.createElement('div');
    dn.className='dnum';
    dn.textContent=d;
    cell.appendChild(dn);

    // Events sorted by time
    const dayEvs=(byDay[d]||[]).sort((a,b)=>{
      const order={'All Day':0,'TBD':99};
      const at=order[a.t]!==undefined?order[a.t]:parseFloat(a.t.replace(':','.'))||50;
      const bt=order[b.t]!==undefined?order[b.t]:parseFloat(b.t.replace(':','.'))||50;
      return at-bt;
    });

    dayEvs.forEach(ev=>{
      const type=evType(ev.key);
      const el=document.createElement('div');
      el.className=`ev ${evClass(type)}`;
      el.innerHTML=`<span class="ev-t">${ev.t}</span><span class="ev-n">${ev.key}</span>`;
      el.onclick=()=>openModal(ev,d,dow,m);
      cell.appendChild(el);
    });

    grid.appendChild(cell);
  }

  // fill trailing
  const total=cfg.firstDOW+cfg.days;
  const rem=total%7;
  if(rem){for(let i=0;i<7-rem;i++){const c=document.createElement('div');c.className='cell empty';grid.appendChild(c);}}

  // stats
  const evs=EVENTS[m]||[];
  const nr=evs.filter(e=>evType(e.key)==='rated').length;
  const nn=evs.filter(e=>evType(e.key)==='nonrated').length;
  const ns=evs.filter(e=>evType(e.key)==='special'||evType(e.key)==='camp').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat s0"><div class="stat-n">${evs.length}</div><div class="stat-l">Total Events</div></div>
    <div class="stat s1"><div class="stat-n">${nr}</div><div class="stat-l">Rated</div></div>
    <div class="stat s2"><div class="stat-n">${nn}</div><div class="stat-l">Non-Rated</div></div>
    <div class="stat s3"><div class="stat-n">${ns}</div><div class="stat-l">Special</div></div>
  `;
}

function setMonth(m){
  curMonth=m;
  [4,5,6,7].forEach(n=>{
    document.getElementById('tab'+n).classList.toggle('active',n===m);
  });
  renderMonth(m);
  window.scrollTo({top:0,behavior:'smooth'});
}

function openModal(ev,day,dow,month){
  const info=T[ev.key]||{};
  const type=evType(ev.key);
  const labels={rated:'✅ Rated Tournament',nonrated:'⚪ Non-Rated Tournament',special:'⭐ Special Event',camp:'⛺ Camp Event'};
  const monthNames={4:'April',5:'May',6:'June',7:'July'};
  document.getElementById('mbadge').className=`mbadge mb-${type==='camp'?'camp':type}`;
  document.getElementById('mbadge').textContent=labels[type]||'Event';
  document.getElementById('mtitle').innerHTML=`${info.icon||'🏓'} ${ev.key}`;
  document.getElementById('mbody').innerHTML=`
    <div class="mrow"><span class="mico">📅</span><div class="mval"><strong>${monthNames[month]} ${day}, 2026</strong> — ${WDAYS[dow]}</div></div>
    <div class="mrow"><span class="mico">🕐</span><div class="mval"><strong>${ev.t}</strong></div></div>
    ${info.days?`<div class="mrow"><span class="mico">🗓</span><div class="mval">${info.days}</div></div>`:''}
    ${info.format?`<div class="mrow"><span class="mico">👥</span><div class="mval">${info.format}</div></div>`:''}
    ${info.price?`<div class="mrow"><span class="mico">💰</span><div class="mval">${info.price}</div></div>`:''}
    ${info.desc?`<div class="mdesc">${info.desc}</div>`:''}
  `;
  document.getElementById('overlay').classList.add('on');
}

function closeModal(){document.getElementById('overlay').classList.remove('on')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

renderMonth(4);
