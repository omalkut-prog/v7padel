<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="assets/auth-guard.js"></script>
<title>V7 Padel — Клиент</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="assets/theme.js"></script>
<script src="assets/data.js?v=20260501e"></script>
<script src="assets/backend.js?v=20260504a"></script>
<link rel="stylesheet" href="assets/theme.css?v=20260418">
<link rel="stylesheet" href="assets/sidebar.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 80px; }
  .breadcrumb { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
  .breadcrumb a { color: var(--accent); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  /* Header */
  .client-header { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start; padding: 20px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 22px; box-shadow: var(--shadow); }
  .ch-name { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .ch-meta { font-size: 12px; color: var(--text3); margin-top: 4px; display: flex; gap: 14px; flex-wrap: wrap; }
  .ch-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .b-active { background: rgba(19,194,150,0.1); color: var(--good); }
  .b-vip { background: rgba(155,89,182,0.1); color: #9b59b6; }
  .b-new { background: rgba(243,156,18,0.1); color: var(--warn); }
  .b-segment { background: var(--accent-soft); color: var(--accent); }

  .ch-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn { padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { opacity: 0.9; color: white; }

  /* Grid */
  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 18px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* Card */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
  .card h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 14px; }

  /* Finance grid */
  .fin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .fin-cell { padding: 12px 14px; background: var(--surface2); border-radius: 10px; }
  .fin-cell .label { font-size: 10.5px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .fin-cell .value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .fin-cell .sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .fin-cell.pos .value { color: var(--good); }
  .fin-cell.neg .value { color: var(--bad); }

  /* Identity grid */
  .id-grid { display: grid; grid-template-columns: 100px 1fr; gap: 8px 14px; font-size: 13px; }
  .id-grid .key { color: var(--text3); }
  .id-grid .val { color: var(--text); }
  .id-grid a { color: var(--accent); text-decoration: none; }

  /* CRM */
  .crm-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; min-height: 30px; align-items: center; }
  .tag-chip { padding: 3px 10px; border-radius: 12px; background: var(--accent-soft); border: 1px solid var(--accent-border); color: var(--accent); font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .tag-chip .x { cursor: pointer; opacity: 0.5; }
  .tag-chip .x:hover { opacity: 1; color: var(--bad); }
  .tag-input-row { display: flex; gap: 6px; }
  .tag-input { flex: 1; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: inherit; }

  .note-list { margin-bottom: 10px; }
  .note { background: var(--surface2); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; font-size: 13px; line-height: 1.55; }
  .note-meta { font-size: 11px; color: var(--text3); margin-top: 6px; display: flex; justify-content: space-between; align-items: center; }
  .note-del { background: none; border: 0; color: var(--text3); cursor: pointer; font-size: 13px; padding: 0 6px; }
  .note-del:hover { color: var(--bad); }
  .note-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px; }

  /* Timeline chart — 12 месяцев */
  .timeline { display: flex; align-items: end; gap: 4px; height: 110px; padding: 8px 0; }
  .tl-month { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 0; cursor: help; }
  .tl-bar { width: 100%; border-radius: 3px 3px 0 0; min-height: 2px; transition: opacity .15s; }
  .tl-month:hover .tl-bar { opacity: 0.85; }
  .tl-month:hover .tl-label, .tl-month:hover .tl-year { color: var(--accent); }
  .tl-label { font-size: 10px; color: var(--text3); text-align: center; white-space: nowrap; font-weight: 500; }
  .tl-year { display: none; }
  .tl-value { font-size: 10px; color: var(--text2); font-weight: 600; height: 12px; }
  .tl-visits { font-size: 11px; color: var(--text); font-weight: 700; padding-top: 4px; }
  .tl-empty { color: var(--text3); font-style: italic; padding: 14px; text-align: center; font-size: 12px; }

  /* Top categories list */
  .cat-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-row { display: grid; grid-template-columns: 110px 1fr auto; gap: 10px; align-items: center; }
  .cat-name { font-size: 12px; color: var(--text2); }
  .cat-bar-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .cat-bar-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }
  .cat-amt { font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; white-space: nowrap; }

  .ai-hint { background: linear-gradient(135deg, rgba(10,186,181,0.06), rgba(155,89,182,0.04)); border: 1px solid rgba(10,186,181,0.25); border-radius: 10px; padding: 14px 18px; margin-bottom: 14px; font-size: 13px; line-height: 1.6; color: var(--text2); }
  .ai-hint strong { color: var(--accent); }

  .loading { text-align: center; padding: 40px; color: var(--text3); }
</style>
</head>
<body>
<main>
  <div class="breadcrumb">
    <a href="clients.html">← Все клиенты</a>
    <span style="margin: 0 8px;">/</span>
    <span id="bc-name">…</span>
  </div>

  <div id="content">
    <div class="loading">Загружаю клиента…</div>
  </div>
</main>

<script>
(async function() {
  // Get cid from URL
  var match = location.search.match(/[?&]cid=(\d+)/);
  if (!match) {
    document.getElementById('content').innerHTML = '<div class="card"><h2>Ошибка</h2><p>Не указан cid в URL. Используй ?cid=N</p></div>';
    return;
  }
  var cid = match[1];

  // Load profile from backend
  var profile;
  try {
    profile = await V7Backend.client(cid);
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="card"><h2>Ошибка загрузки</h2><p>' + e.message + '</p>' +
      '<p style="margin-top:8px"><a href="clients.html" style="color:var(--accent)">← Вернуться к списку</a></p></div>';
    return;
  }

  if (profile.error) {
    document.getElementById('content').innerHTML =
      '<div class="card"><h2>Клиент не найден</h2><p>cid=' + cid + ' не существует в базе.</p></div>';
    return;
  }

  render(profile, cid);
})();

function render(p, cid) {
  var i = p.identity || {};
  var f = p.finance || {};
  var crm = p.crm || { notes: [], tags: [], contact_log: [] };
  var timeline = p.timeline || [];
  var topCats = p.top_categories || [];
  var rid = p.racket_id;
  var catsAll = (f && f.categories_all) || {};
  var cats30 = (f && f.categories_30d) || {};

  // Breadcrumb name
  document.getElementById('bc-name').textContent = i.name || 'cid=' + cid;
  document.title = 'V7 Padel — ' + (i.name || 'Клиент');

  var fmt = function(n) { return Math.round(n || 0).toLocaleString('ru-RU'); };
  var fmtMoney = function(n) { return fmt(n) + ' ₺'; };

  // Badges
  var badges = '';
  if (f.activity_bucket === 'active' || (f.days_since_last_tx > 0 && f.days_since_last_tx <= 30)) {
    badges += '<span class="badge b-active">🟢 активный</span>';
  } else if (f.days_since_last_tx > 30) {
    badges += '<span class="badge b-new" style="background:rgba(231,76,60,0.1);color:var(--bad)">🔴 ' + f.days_since_last_tx + 'д не был</span>';
  }
  if ((crm.tags || []).some(function(t) { return /vip/i.test(t.tag); })) {
    badges += '<span class="badge b-vip">💎 VIP</span>';
  }
  if (f.segment) {
    badges += '<span class="badge b-segment">' + escapeHtml(f.segment) + '</span>';
  }

  // Action buttons
  var actions = '';
  if (i.whatsapp) {
    var wa = String(i.whatsapp).replace(/\D/g, '');
    actions += '<a class="btn btn-primary" href="https://wa.me/' + wa + '" target="_blank">💬 WhatsApp</a>';
  } else if (i.phone) {
    var ph = String(i.phone).replace(/\D/g, '');
    if (ph) actions += '<a class="btn btn-primary" href="https://wa.me/' + ph + '" target="_blank">💬 WhatsApp</a>';
  }
  if (i.telegram) {
    actions += '<a class="btn" href="https://t.me/' + escapeHtml(i.telegram.replace(/^@/, '')) + '" target="_blank">📱 Telegram</a>';
  }
  if (i.email) {
    actions += '<a class="btn" href="mailto:' + escapeHtml(i.email) + '">✉️ Email</a>';
  }

  // Identity grid
  var idHtml = '';
  if (i.phone) idHtml += '<div class="key">Телефон</div><div class="val">' + escapeHtml(i.phone) + '</div>';
  if (i.email) idHtml += '<div class="key">Email</div><div class="val"><a href="mailto:' + escapeHtml(i.email) + '">' + escapeHtml(i.email) + '</a></div>';
  if (i.level) idHtml += '<div class="key">Уровень</div><div class="val">' + escapeHtml(i.level) + '</div>';
  if (i.gender || i.age) idHtml += '<div class="key">Возраст/пол</div><div class="val">' + escapeHtml(i.gender || '') + ' ' + (i.age ? i.age + ' лет' : '') + '</div>';
  if (i.nationality) idHtml += '<div class="key">Национальность</div><div class="val">' + escapeHtml(i.nationality) + '</div>';
  if (i.language) idHtml += '<div class="key">Язык</div><div class="val">' + escapeHtml(i.language) + '</div>';
  if (i.birthday) idHtml += '<div class="key">День рождения</div><div class="val">' + escapeHtml(i.birthday) + '</div>';
  if (i.subs_date) idHtml += '<div class="key">С нами с</div><div class="val">' + escapeHtml(i.subs_date) + '</div>';

  // Finance grid
  var finHtml = '';
  finHtml += '<div class="fin-cell ' + (f.balance > 0 ? 'pos' : '') + '"><div class="label">Баланс</div><div class="value">' + fmtMoney(f.balance) + '</div><div class="sub">' + (f.balance > 0 ? 'клуб должен клиенту' : '—') + '</div></div>';
  finHtml += '<div class="fin-cell"><div class="label">Выручка всё</div><div class="value">' + fmtMoney(f.amount_all) + '</div><div class="sub">' + (f.bookings_all || 0) + ' визитов</div></div>';
  finHtml += '<div class="fin-cell"><div class="label">За 30 дней</div><div class="value">' + fmtMoney(f.amount_30d) + '</div><div class="sub">' + (f.bookings_30d || 0) + ' визитов</div></div>';
  finHtml += '<div class="fin-cell"><div class="label">За 90 дней</div><div class="value">' + fmtMoney(f.amount_90d) + '</div><div class="sub">—</div></div>';
  finHtml += '<div class="fin-cell"><div class="label">Средний чек</div><div class="value">' + fmtMoney(f.avg_check_30d || f.avg_check_all) + '</div><div class="sub">' + (f.avg_check_30d ? 'за 30д' : 'за всё') + '</div></div>';
  finHtml += '<div class="fin-cell"><div class="label">Последний визит</div><div class="value" style="font-size:14px">' + (f.last_tx ? f.last_tx : '—') + '</div><div class="sub">' + (f.days_since_last_tx ? f.days_since_last_tx + 'д назад' : '—') + '</div></div>';

  // AI hint placeholder (Phase 2)
  var aiHint = '<div class="ai-hint">' +
    '<strong>🤖 AI-анализ паттернов</strong> — в разработке. План: автоматически анализировать историю игр и подсказывать заметки типа «играет по утрам Пн/Ср, чаще с Иваном, любит P2». Пока пишите вручную ниже.' +
    '</div>';

  // Timeline chart (12 месяцев) — улучшено: gap-fill, spend bars + visits + читаемые labels
  var MONTH_NAMES_RU = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  var timelineHtml = '';
  if (timeline.length) {
    // Заполняем gaps — последние 12 месяцев подряд
    var now = new Date();
    var fullTimeline = [];
    for (var k = 11; k >= 0; k--) {
      var d = new Date(now.getFullYear(), now.getMonth() - k, 1);
      var ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      var existing = timeline.find(function(t) { return t.month === ym; });
      fullTimeline.push(existing || { month: ym, visits: 0, spend: 0 });
    }
    var maxSpend = Math.max.apply(null, fullTimeline.map(function(t) { return t.spend; })) || 1;
    timelineHtml = '<div class="timeline">' + fullTimeline.map(function(t) {
      var h = t.spend > 0 ? Math.max(4, (t.spend / maxSpend) * 70) : 2;
      var d = new Date(t.month + '-01');
      var label = MONTH_NAMES_RU[d.getMonth()];
      var year = String(d.getFullYear()).slice(2);
      var spendStr = t.spend > 0 ? Math.round(t.spend / 1000) + 'k' : '';
      var color = t.spend === 0 ? 'var(--surface2)' : 'linear-gradient(180deg,var(--accent),var(--accent-soft))';
      var titleText = label + ' ' + d.getFullYear() + ': ' + (t.visits || 0) + ' визитов, ' + Math.round(t.spend).toLocaleString('ru-RU') + ' ₺';
      return '<div class="tl-month" title="' + escapeHtml(titleText) + '">' +
             '<div class="tl-value">' + spendStr + '</div>' +
             '<div class="tl-bar" style="height:' + h + 'px;background:' + color + '"></div>' +
             '<div class="tl-visits">' + (t.visits || '·') + '</div>' +
             '<div class="tl-label">' + label + ' \'' + year + '</div>' +
             '</div>';
    }).join('') + '</div>' +
    '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:8px;padding:0 4px">' +
      '<span>k = тысячи ₺ потрачено</span><span>число под bar = визиты</span>' +
    '</div>';
  } else {
    timelineHtml = '<div class="tl-empty">Нет транзакций за последние 12 месяцев</div>';
  }

  // Структура трат (как в /revenue) — 5 категорий + переключатель периода
  function renderCatBreakdown(cats, periodLabel) {
    var entries = [
      { key: 'memberships', label: '👑 Membership (Club/VIP)', amount: cats.memberships || 0 },
      { key: 'training', label: '🎾 Тренировки', amount: cats.training || 0 },
      { key: 'tournaments', label: '🏆 Турниры', amount: cats.tournaments || 0 },
      { key: 'courts', label: '⏱ Корты (аренда)', amount: cats.courts || 0 },
      { key: 'goods', label: '🛒 Магазин/инвентарь', amount: cats.goods || 0 },
      { key: 'other', label: '· Прочее', amount: cats.other || 0 },
    ];
    var total = entries.reduce(function(s, e) { return s + e.amount; }, 0);
    if (total === 0) return '<div style="color:var(--text3);font-size:12px;font-style:italic;padding:14px 0">Нет трат за период</div>';
    entries = entries.filter(function(e) { return e.amount > 0; }).sort(function(a, b) { return b.amount - a.amount; });
    var maxAmt = entries[0].amount;
    var html = '<div class="cat-list">';
    entries.forEach(function(e) {
      var pct = (e.amount / maxAmt) * 100;
      var sharePct = total > 0 ? Math.round(100 * e.amount / total) : 0;
      html += '<div class="cat-row">' +
              '<div class="cat-name">' + e.label + '</div>' +
              '<div class="cat-bar-track"><div class="cat-bar-fill" style="width:' + pct + '%"></div></div>' +
              '<div class="cat-amt">' + Math.round(e.amount).toLocaleString('ru-RU') + ' ₺<span style="color:var(--text3);font-size:10px;margin-left:6px">' + sharePct + '%</span></div>' +
              '</div>';
    });
    html += '</div>';
    html += '<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);text-align:right">' +
            'Итого ' + escapeHtml(periodLabel) + ': <strong>' + Math.round(total).toLocaleString('ru-RU') + ' ₺</strong></div>';
    return html;
  }
  var catsAllHtml = renderCatBreakdown(catsAll, 'за всё время');
  var cats30Html = renderCatBreakdown(cats30, 'за 30 дней');

  // Racket.ID block (если match есть)
  var ridHtml = '';
  if (rid && rid.user_id) {
    var rating = rid.rating != null ? rid.rating : '?';
    var ratingColor = rid.rating == null ? 'var(--text3)' :
                      rid.rating >= 1500 ? '#9b59b6' :  // pro
                      rid.rating >= 1200 ? '#0ABAB5' :  // advanced
                      rid.rating >= 900 ? '#f39c12' :   // intermediate
                      '#7c8898';                         // beginner
    var levelLabel = rid.rating == null ? '—' :
                     rid.rating >= 1500 ? 'Pro' :
                     rid.rating >= 1200 ? 'Advanced' :
                     rid.rating >= 900 ? 'Intermediate' :
                     'Beginner';
    ridHtml = '<div class="card">' +
      '<h2>🎾 Racket.ID профиль</h2>' +
      '<div style="display:flex;align-items:center;gap:18px;margin-bottom:14px">' +
        '<div style="background:linear-gradient(135deg,' + ratingColor + ',var(--surface2));color:#fff;padding:14px 20px;border-radius:12px;text-align:center;min-width:90px">' +
          '<div style="font-size:11px;opacity:0.85;text-transform:uppercase;letter-spacing:0.8px">Рейтинг</div>' +
          '<div style="font-size:24px;font-weight:700">' + rating + '</div>' +
          '<div style="font-size:11px;opacity:0.85">' + levelLabel + '</div>' +
        '</div>' +
        '<div style="flex:1;font-size:13px;color:var(--text2)">' +
          '<div><strong>Турниров:</strong> ' + (rid.tournaments_count || 0) + '</div>' +
          '<div style="margin-top:4px;font-size:11px;color:var(--text3)">match по ' + escapeHtml(rid.matched_by) + '</div>' +
        '</div>' +
        (rid.profile_url ? '<a class="btn btn-primary" href="' + escapeHtml(rid.profile_url) + '" target="_blank">Открыть в Racket.ID →</a>' : '') +
      '</div>' +
      ((rid.recent_tournaments || []).length ? '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:10px">Последние ' + rid.recent_tournaments.length + ' турниров (всего ' + (rid.tournaments_count || 0) + ')</div>' +
        '<div style="display:grid;grid-template-columns:1fr;gap:8px">' +
        rid.recent_tournaments.map(function(t) {
          // Date format: "2026-04-04 10:00:00" → "04 апр · 10:00"
          var dateStr = t.date || '';
          var dateClean = '—', timeClean = '';
          if (dateStr) {
            var parts = dateStr.split(' ');
            var datePart = parts[0]; // 2026-04-04
            var timePart = parts[1] ? parts[1].slice(0,5) : ''; // 10:00
            if (datePart) {
              var d = new Date(datePart);
              if (!isNaN(d)) {
                dateClean = String(d.getDate()).padStart(2,'0') + ' ' + MONTH_NAMES_RU[d.getMonth()] + ' \'' + String(d.getFullYear()).slice(2);
                timeClean = timePart;
              }
            }
          }
          // Очистка title — обрезаем, нормализуем
          var title = (t.title || '—').trim();
          if (title.length > 50) title = title.slice(0, 47) + '...';
          // Категория из title (heuristic): пол, уровень
          var titleLower = title.toLowerCase();
          var catBadges = [];
          if (/\bopen\b|\bкубок\b|\bcup\b/i.test(title)) catBadges.push({t:'Open', c:'#9b59b6'});
          if (/\bженск|female|women|kadın/i.test(titleLower)) catBadges.push({t:'♀', c:'#e91e63'});
          else if (/\bмужск|male|men|erkek/i.test(titleLower)) catBadges.push({t:'♂', c:'#0ABAB5'});
          if (/mixed|микс|karma|mikst/i.test(titleLower)) catBadges.push({t:'Mixed', c:'#f39c12'});
          var lvlMatch = title.match(/\b([A-D]\d?|[1-9]\.[0-9])\b/);
          if (lvlMatch) catBadges.push({t: lvlMatch[1], c:'#7c8898'});
          var badgesHtml = catBadges.map(function(b) {
            return '<span style="background:' + b.c + '22;color:' + b.c + ';font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap">' + escapeHtml(b.t) + '</span>';
          }).join(' ');
          // Кликабельный заголовок если есть product_id
          var titleHtml = t.product_id
            ? '<a href="https://racket.id/p/' + escapeHtml(t.product_id) + '" target="_blank" style="color:var(--text);text-decoration:none;font-weight:600;border-bottom:1px dotted var(--accent)">' + escapeHtml(title) + '</a>'
            : '<span style="font-weight:600;color:var(--text)">' + escapeHtml(title) + '</span>';
          return '<div style="padding:12px 14px;background:var(--surface2);border-radius:10px;border-left:3px solid ' + (catBadges[0] ? catBadges[0].c : 'var(--accent)') + '">' +
                 '<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:6px;flex-wrap:wrap">' +
                   titleHtml +
                   (badgesHtml ? '<div style="display:flex;gap:4px;flex-wrap:wrap">' + badgesHtml + '</div>' : '') +
                 '</div>' +
                 '<div style="font-size:12px;color:var(--text3);display:flex;gap:14px;flex-wrap:wrap">' +
                   '<span>📅 ' + escapeHtml(dateClean) + (timeClean ? ' · ' + escapeHtml(timeClean) : '') + '</span>' +
                   (t.product_id ? '<span style="color:var(--accent)">→ Открыть на Racket.ID</span>' : '') +
                 '</div>' +
                 '</div>';
        }).join('') + '</div></div>' : '') +
      '</div>';
  } else {
    ridHtml = '<div class="card" style="opacity:0.7">' +
      '<h2>🎾 Racket.ID профиль</h2>' +
      '<div style="font-size:13px;color:var(--text3);font-style:italic">Профиль не найден. Попроси клиента зарегистрироваться на ' +
        '<a href="https://racket.id" target="_blank" style="color:var(--accent)">racket.id</a> для рейтинга и турниров.</div>' +
      '</div>';
  }

  // Top categories
  var catsHtml = '';
  if (topCats.length) {
    var maxAmt = Math.max.apply(null, topCats.map(function(c) { return c.amount; })) || 1;
    catsHtml = '<div class="cat-list">' + topCats.map(function(c) {
      var pct = (c.amount / maxAmt) * 100;
      return '<div class="cat-row">' +
             '<div class="cat-name">' + escapeHtml(c.category) + '</div>' +
             '<div class="cat-bar-track"><div class="cat-bar-fill" style="width:' + pct + '%"></div></div>' +
             '<div class="cat-amt">' + Math.round(c.amount).toLocaleString('ru-RU') + ' ₺</div>' +
             '</div>';
    }).join('') + '</div>';
  } else {
    catsHtml = '<div style="color:var(--text3);font-size:12px;font-style:italic">Нет покупок за 90 дней</div>';
  }

  // Tags
  var tagsHtml = renderTagsHtml(crm.tags || []);

  // Notes
  var notesHtml = renderNotesHtml(crm.notes || []);

  // Contact log
  var contactsHtml = '';
  if ((crm.contact_log || []).length) {
    contactsHtml = '<div style="margin-top:10px">' +
      crm.contact_log.slice(0, 5).map(function(c) {
        return '<div style="font-size:12px;color:var(--text2);padding:6px 10px;background:var(--surface2);border-radius:6px;margin-bottom:4px">' +
               '<strong>' + escapeHtml(c.channel) + '</strong> · ' + escapeHtml(c.result) +
               (c.note ? ' — ' + escapeHtml(c.note) : '') +
               ' <span style="color:var(--text3);font-size:11px">(' + new Date(c.created_at).toLocaleDateString('ru-RU') + ')</span>' +
               '</div>';
      }).join('') +
      '</div>';
  } else {
    contactsHtml = '<div style="color:var(--text3);font-size:12px;font-style:italic">пока нет записей</div>';
  }

  document.getElementById('content').innerHTML =
    '<div class="client-header">' +
      '<div>' +
        '<div class="ch-name">' + escapeHtml(i.name || 'cid=' + cid) + '</div>' +
        '<div class="ch-meta">' +
          '<span>ID: ' + cid + '</span>' +
          (i.subs_date ? '<span>· регистрация ' + escapeHtml(i.subs_date) + '</span>' : '') +
          (f.bookings_all ? '<span>· ' + f.bookings_all + ' визитов</span>' : '') +
        '</div>' +
        '<div class="ch-badges">' + badges + '</div>' +
      '</div>' +
      '<div class="ch-actions">' + actions + '</div>' +
    '</div>' +

    '<div class="grid">' +
      '<div>' +
        '<div class="card">' +
          '<h2>💰 Финансы</h2>' +
          '<div class="fin-grid">' + finHtml + '</div>' +
        '</div>' +

        ridHtml +

        '<div class="card">' +
          '<h2>📊 Активность по месяцам</h2>' +
          timelineHtml +
        '</div>' +

        '<div class="card">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">' +
            '<h2 style="margin:0">💸 Структура трат</h2>' +
            '<div style="display:flex;gap:4px;background:var(--surface2);padding:3px;border-radius:8px">' +
              '<button class="cat-period-btn" data-period="30d" style="padding:6px 14px;border:0;background:transparent;cursor:pointer;font-size:12px;color:var(--text2);border-radius:6px;font-family:inherit">30 дней</button>' +
              '<button class="cat-period-btn active" data-period="all" style="padding:6px 14px;border:0;background:var(--accent);color:white;cursor:pointer;font-size:12px;border-radius:6px;font-family:inherit">Всё время</button>' +
            '</div>' +
          '</div>' +
          '<div id="cat-content">' + catsAllHtml + '</div>' +
        '</div>' +

        '<div class="card">' +
          '<h2>📝 Заметки</h2>' +
          aiHint +
          '<div class="note-list" id="notes-list">' + notesHtml + '</div>' +
          '<textarea class="note-input" id="note-input" placeholder="Написать заметку (что обсудили, что важно помнить, что любит)..."></textarea>' +
          '<button class="btn btn-primary" id="note-add" style="margin-top:8px">Сохранить заметку</button>' +
        '</div>' +
      '</div>' +

      '<div>' +
        '<div class="card">' +
          '<h2>👤 Идентификация</h2>' +
          '<div class="id-grid">' + idHtml + '</div>' +
        '</div>' +

        '<div class="card">' +
          '<h2>🏷️ Теги</h2>' +
          '<div class="crm-tags" id="tags-list">' + tagsHtml + '</div>' +
          '<div class="tag-input-row">' +
            '<input class="tag-input" id="tag-input" type="text" placeholder="VIP, инфлюенсер, любит коуча X..." />' +
            '<button class="btn btn-primary" id="tag-add">+</button>' +
          '</div>' +
        '</div>' +

        '<div class="card">' +
          '<h2>📞 Контакты</h2>' +
          contactsHtml +
          '<button class="btn" id="contact-add" style="margin-top:10px;width:100%">+ Записать контакт</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  // Bind handlers
  bindHandlers(cid);

  // Category period switcher
  document.querySelectorAll('.cat-period-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.cat-period-btn').forEach(function(b) {
        b.classList.remove('active');
        b.style.background = 'transparent';
        b.style.color = 'var(--text2)';
      });
      btn.classList.add('active');
      btn.style.background = 'var(--accent)';
      btn.style.color = 'white';
      var period = btn.dataset.period;
      document.getElementById('cat-content').innerHTML = period === '30d' ? cats30Html : catsAllHtml;
    });
  });
}

function renderTagsHtml(tags) {
  if (!tags.length) return '<span style="color:var(--text3);font-size:12px;font-style:italic">тегов нет</span>';
  return tags.map(function(t) {
    return '<span class="tag-chip">' + escapeHtml(t.tag) + '</span>';
  }).join('');
}

function renderNotesHtml(notes) {
  if (!notes.length) return '<div style="color:var(--text3);font-size:12px;font-style:italic;text-align:center;padding:20px">Пока нет заметок</div>';
  return notes.map(function(n) {
    var dt = new Date(n.created_at);
    var dtStr = dt.toLocaleDateString('ru-RU') + ' ' + dt.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    return '<div class="note">' +
           '<div style="white-space:pre-wrap">' + escapeHtml(n.text) + '</div>' +
           '<div class="note-meta">' +
             '<span>' + escapeHtml(n.author || 'admin') + ' · ' + dtStr + '</span>' +
             '<button class="note-del" data-id="' + n.id + '" title="Удалить">✕</button>' +
           '</div>' +
           '</div>';
  }).join('');
}

function bindHandlers(cid) {
  // Add note
  var noteAdd = document.getElementById('note-add');
  var noteInput = document.getElementById('note-input');
  noteAdd.addEventListener('click', async function() {
    var v = noteInput.value.trim();
    if (!v) return;
    try {
      await V7Backend.notes.create(parseInt(cid), v);
      noteInput.value = '';
      var notes = await V7Backend.notes.list(parseInt(cid));
      document.getElementById('notes-list').innerHTML = renderNotesHtml(notes);
      bindNoteDeleteHandlers(cid);
    } catch (e) { alert('Не удалось: ' + e.message); }
  });
  bindNoteDeleteHandlers(cid);

  // Add tag
  var tagAdd = document.getElementById('tag-add');
  var tagInput = document.getElementById('tag-input');
  tagAdd.addEventListener('click', async function() {
    var v = tagInput.value.trim();
    if (!v) return;
    try {
      await V7Backend.tags.create(parseInt(cid), v);
      tagInput.value = '';
      var data = await V7Backend.client(cid);
      document.getElementById('tags-list').innerHTML = renderTagsHtml((data.crm || {}).tags || []);
    } catch (e) { alert('Не удалось: ' + e.message); }
  });
  tagInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') tagAdd.click(); });

  // Contact log
  document.getElementById('contact-add').addEventListener('click', async function() {
    var channel = prompt('Канал (whatsapp / call / email / in_person)?', 'whatsapp');
    if (!channel) return;
    var result = prompt('Результат (answered / no_answer / booked / refused / scheduled)?', 'answered');
    if (!result) return;
    var note = prompt('Заметка (опционально):', '');
    try {
      await V7Backend.contactLog.create(parseInt(cid), { channel: channel, direction: 'out', result: result, note: note || '' });
      location.reload();
    } catch (e) { alert('Не удалось: ' + e.message); }
  });
}

function bindNoteDeleteHandlers(cid) {
  document.querySelectorAll('.note-del').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      if (!confirm('Удалить заметку?')) return;
      try {
        await V7Backend.notes.delete(parseInt(btn.dataset.id));
        var notes = await V7Backend.notes.list(parseInt(cid));
        document.getElementById('notes-list').innerHTML = renderNotesHtml(notes);
        bindNoteDeleteHandlers(cid);
      } catch (e) { alert('Не удалось: ' + e.message); }
    });
  });
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}
</script>
<script src="assets/sidebar.js"></script>
</body>
