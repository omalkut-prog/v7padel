<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="assets/auth-guard.js"></script>
<title>V7 Padel — База знаний</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="assets/theme.css?v=20260430a">
<link rel="stylesheet" href="assets/sidebar.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .brain-layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    min-height: 100vh;
  }
  .brain-toc {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 18px;
    overflow-y: auto;
    position: sticky;
    top: 0;
    max-height: 100vh;
  }
  .brain-main {
    padding: 32px 40px 80px;
    max-width: 920px;
  }
  .toc-header { margin-bottom: 18px; }
  .toc-header .brand {
    font-size: 16px; font-weight: 700; letter-spacing: -0.3px; color: var(--text);
    margin-bottom: 4px;
  }
  .toc-header .brand .accent { color: var(--accent); }
  .toc-header .sub { font-size: 12px; color: var(--text3); }
  .toc-search { margin-bottom: 16px; }
  .toc-search input {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--surface2); color: var(--text);
    font-family: inherit; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  .toc-search input:focus { border-color: var(--accent); }
  .toc-list { list-style: none; }
  .toc-list li { margin: 1px 0; }
  .toc-list a {
    display: block; padding: 7px 10px; border-radius: 6px;
    color: var(--text2); text-decoration: none; font-size: 13px;
    line-height: 1.4; transition: all .12s;
  }
  .toc-list a:hover { background: var(--surface2); color: var(--text); }
  .toc-list a.active {
    background: var(--accent-soft); color: var(--accent); font-weight: 600;
  }
  .toc-list a .num {
    display: inline-block; min-width: 22px;
    color: var(--text3); font-weight: 600; font-size: 11px;
    margin-right: 6px;
  }
  .toc-list a.active .num { color: var(--accent); }
  .toc-divider {
    margin: 16px 0 8px; padding: 0 10px;
    font-size: 10px; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600;
  }
  .toc-foot {
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text3); line-height: 1.6;
  }
  .toc-foot a { color: var(--accent); text-decoration: none; }

  .md-body { font-size: 15px; line-height: 1.7; color: var(--text); }
  .md-body h1 {
    font-size: 30px; font-weight: 700; letter-spacing: -1px;
    margin: 0 0 16px; padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .md-body h2 {
    font-size: 22px; font-weight: 700; letter-spacing: -0.4px;
    margin: 30px 0 12px;
  }
  .md-body h3 {
    font-size: 17px; font-weight: 700;
    margin: 22px 0 10px; color: var(--text);
  }
  .md-body h4 { font-size: 15px; font-weight: 700; margin: 18px 0 8px; }
  .md-body p { margin: 0 0 12px; }
  .md-body ul, .md-body ol { margin: 0 0 14px 22px; }
  .md-body li { margin: 4px 0; }
  .md-body strong, .md-body b { font-weight: 700; color: var(--text); }
  .md-body em { font-style: italic; }
  .md-body a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent-border); }
  .md-body a:hover { border-bottom-style: solid; }
  .md-body code {
    background: var(--surface2); padding: 1px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--text);
  }
  .md-body pre {
    background: var(--surface2); padding: 14px 18px; border-radius: 10px;
    overflow-x: auto; margin: 14px 0; border: 1px solid var(--border);
  }
  .md-body pre code { background: none; padding: 0; font-size: 12.5px; }
  .md-body blockquote {
    border-left: 3px solid var(--accent);
    background: var(--accent-soft);
    padding: 10px 16px; margin: 14px 0;
    border-radius: 0 8px 8px 0;
    color: var(--text);
  }
  .md-body blockquote p:last-child { margin: 0; }
  .md-body table {
    width: 100%; border-collapse: collapse; margin: 14px 0;
    font-size: 13px;
  }
  .md-body th, .md-body td {
    border: 1px solid var(--border); padding: 8px 12px; text-align: left;
  }
  .md-body th {
    background: var(--surface2); font-weight: 700; color: var(--text);
  }
  .md-body td { color: var(--text); }
  .md-body hr {
    border: 0; border-top: 1px solid var(--border); margin: 26px 0;
  }
  .md-body .doc-meta {
    background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; margin-bottom: 22px;
    font-size: 12px; color: var(--text3);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .md-body .doc-meta a { color: var(--accent); text-decoration: none; border-bottom: 0; }
  .md-body .doc-meta a:hover { text-decoration: underline; }

  .loading {
    text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px;
  }
  .err {
    background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.2);
    color: var(--bad); border-radius: 8px; padding: 14px 18px; font-size: 13px;
  }

  .toc-toggle {
    display: none;
    position: fixed; top: 16px; left: 16px; z-index: 100;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600; color: var(--text);
  }
  @media (max-width: 880px) {
    .brain-layout { grid-template-columns: 1fr; }
    .brain-toc {
      position: fixed; top: 0; left: -300px; bottom: 0; width: 280px;
      transition: left .25s; z-index: 90;
      box-shadow: 4px 0 20px rgba(0,0,0,0.15);
    }
    .brain-toc.open { left: 0; }
    .brain-main { padding: 60px 22px 80px; }
    .toc-toggle { display: block; }
  }
</style>
</head>
<body>

<button class="toc-toggle" id="toc-toggle">📚 Меню</button>

<div class="brain-layout">

  <aside class="brain-toc" id="brain-toc">
    <div class="toc-header">
      <div class="brand">V7 <span class="accent">База знаний</span></div>
      <div class="sub">Single source of truth · git-versioned</div>
    </div>
    <div class="toc-search">
      <input type="text" id="toc-search-input" placeholder="🔎 Поиск по разделам..." autocomplete="off">
    </div>
    <ul class="toc-list" id="toc-list"></ul>
    <div class="toc-foot">
      <p>Все markdown файлы:<br>
        <a href="https://github.com/omalkut-prog/v7padel/tree/main/site/docs" target="_blank" rel="noopener">→ GitHub /site/docs</a>
      </p>
      <p style="margin-top:10px"><a href="dashboard.html">↗ Внутренний дашборд</a></p>
    </div>
  </aside>

  <main class="brain-main">
    <div id="brain-content" class="md-body">
      <div class="loading">Загружаю базу знаний…</div>
    </div>
  </main>

</div>

<script>
/* V7 Brain — markdown reader for site/docs/*.md
   Single source of truth: site/docs/. Этот файл — клиентский ридер
   через marked.js, не дублирует контент. */

var TOC_GROUPS = [
  {
    title: "Старт",
    docs: [
      { id: "00_NORTH_STAR",       label: "00 · North Star", desc: "Цели, стратегия 4 контуров, KPI" },
      { id: "04_CURRENT_STATE",    label: "04 · Current State", desc: "Live числа: клиенты, выручка" },
      { id: "05_BACKLOG",          label: "05 · Backlog", desc: "Приоритеты NOW / NEXT / LATER" },
    ]
  },
  {
    title: "Технология",
    docs: [
      { id: "01_ARCHITECTURE",     label: "01 · Architecture", desc: "Стек, таблицы, страницы, деплой" },
      { id: "02_MATCHPOINT_API",   label: "02 · Matchpoint API", desc: "Эндпоинты, ASP.NET, пагинация" },
      { id: "03_ETL_PLAYBOOK",     label: "03 · ETL Playbook", desc: "Каталог скриптов" },
      { id: "16_CONSISTENCY_AUDIT", label: "16 · Consistency Audit", desc: "Cross-checks формул" },
      { id: "17_TESTING",          label: "17 · Testing", desc: "pytest, как добавлять тесты" },
    ]
  },
  {
    title: "Бизнес",
    docs: [
      { id: "06_PRINCIPLES",       label: "06 · Principles", desc: "Как работаем" },
      { id: "07_ANTI_PATTERNS",    label: "07 · Anti-Patterns", desc: "Как НЕ работаем" },
      { id: "08_TEAM_AND_ROLES",   label: "08 · Team and Roles", desc: "Команда, cid, доступы" },
      { id: "10_PRICES_AND_HOURS", label: "10 · Prices and Hours", desc: "Реальные цены и часы" },
      { id: "11_MARKETING",        label: "11 · Marketing", desc: "Аватар, каналы, месседжинг" },
    ]
  },
  {
    title: "Решения и правила",
    docs: [
      { id: "09_DECISIONS",        label: "09 · ADR Log", desc: "Архитектурные решения" },
      { id: "13_ACCOUNTING_RULES", label: "13 · Accounting Rules", desc: "Cash-basis + dedup" },
      { id: "14_CODE_REVIEW",      label: "14 · Code Review", desc: "Bi-monthly процесс" },
      { id: "15_FINANCE_RECONCILIATION", label: "15 · Finance Reconciliation", desc: "Сверка с финикой" },
    ]
  },
  {
    title: "Работа с Claude",
    docs: [
      { id: "12_WORKING_WITH_CLAUDE", label: "12 · Working with Claude", desc: "Двусторонние правила" },
    ]
  },
  {
    title: "События",
    docs: [
      { id: "18_TEAM_MEETING_2026-05", label: "18 · Team Meeting Май 2026", desc: "Речь, цели, бонус" },
      { id: "antalya-baseline",    label: "Antalya Baseline", desc: "Базовая модель клуба" },
    ]
  },
];

var DOCS_PATH = 'docs/';

function buildTOC() {
  var list = document.getElementById('toc-list');
  var html = '';
  TOC_GROUPS.forEach(function(group) {
    html += '<li class="toc-divider">' + group.title + '</li>';
    group.docs.forEach(function(d) {
      var num = d.id.split('_')[0].replace(/^0+/, '') || '·';
      html += '<li><a href="#' + d.id + '" data-doc-id="' + d.id + '" title="' + (d.desc || '') + '">';
      html += '<span class="num">' + num + '</span>' + d.label.replace(/^\d+ · /, '');
      html += '</a></li>';
    });
  });
  list.innerHTML = html;

  list.querySelectorAll('a').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var id = this.dataset.docId;
      loadDoc(id);
      window.location.hash = id;
      document.getElementById('brain-toc').classList.remove('open');
    });
  });
}

function setActive(id) {
  document.querySelectorAll('.toc-list a').forEach(function(a) {
    a.classList.toggle('active', a.dataset.docId === id);
  });
}

async function loadDoc(id) {
  var content = document.getElementById('brain-content');
  setActive(id);
  content.innerHTML = '<div class="loading">Загружаю ' + id + '.md…</div>';

  try {
    var url = DOCS_PATH + encodeURIComponent(id) + '.md?t=' + Math.floor(Date.now() / 60000);
    var r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var md = await r.text();

    marked.setOptions({ breaks: false, gfm: true });
    var html = marked.parse(md);

    var ghUrl = 'https://github.com/omalkut-prog/v7padel/blob/main/site/docs/' + encodeURIComponent(id) + '.md';
    var meta = '<div class="doc-meta">' +
      '<span><b>' + id + '.md</b> · markdown source · <a href="' + ghUrl + '" target="_blank" rel="noopener">edit on GitHub</a></span>' +
      '<span>загружено: ' + new Date().toLocaleString('ru-RU') + '</span>' +
      '</div>';

    content.innerHTML = meta + html;
    document.title = 'V7 Brain · ' + id;
    window.scrollTo({ top: 0, behavior: 'instant' });
  } catch (e) {
    content.innerHTML = '<div class="err">⚠ Не удалось загрузить ' + id + '.md: ' + (e.message || e) + '</div>';
  }
}

function searchToc() {
  var q = document.getElementById('toc-search-input').value.toLowerCase().trim();
  var items = document.querySelectorAll('.toc-list a');
  items.forEach(function(a) {
    var text = a.textContent.toLowerCase();
    var title = (a.title || '').toLowerCase();
    var match = !q || text.indexOf(q) >= 0 || title.indexOf(q) >= 0;
    a.parentElement.style.display = match ? '' : 'none';
  });
  document.querySelectorAll('.toc-divider').forEach(function(d) {
    var nextLi = d.nextElementSibling;
    var hasVisible = false;
    while (nextLi && !nextLi.classList.contains('toc-divider')) {
      if (nextLi.style.display !== 'none') { hasVisible = true; break; }
      nextLi = nextLi.nextElementSibling;
    }
    d.style.display = hasVisible ? '' : 'none';
  });
}

buildTOC();
document.getElementById('toc-search-input').addEventListener('input', searchToc);
document.getElementById('toc-toggle').addEventListener('click', function() {
  document.getElementById('brain-toc').classList.toggle('open');
});

var initialDoc = window.location.hash.slice(1) || '00_NORTH_STAR';
loadDoc(initialDoc);

window.addEventListener('hashchange', function() {
  var id = window.location.hash.slice(1);
  if (id) loadDoc(id);
});
</script>
</body>
</html>
