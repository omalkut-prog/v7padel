<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V7 Padel — May Team Goal · Layout 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css?v=20260427d">
<link rel="stylesheet" href="assets/may-goal-common.css?v=20260427d">
<style>
  /* === V2: Сплит-табло. Слева текущее, справа цели === */
  .header { margin-bottom: 24px; }
  .header .pill {
    display: inline-block; background: var(--accent-soft); color: var(--accent);
    border: 1px solid var(--accent-border); font-size: 11px; font-weight: 600;
    padding: 5px 12px; border-radius: 30px; letter-spacing: 1.5px;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .header h1 { font-size: 30px; font-weight: 700; letter-spacing: -1px; line-height: 1.15; margin-bottom: 6px; }
  .header h1 .accent { color: var(--accent); }
  .header .sub { color: var(--text2); font-size: 14px; max-width: 720px; line-height: 1.55; }

  /* SPLIT: left current state, right goal */
  .split {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .split-left {
    padding: 32px 36px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent) 100%);
    color: #fff;
    border: 0;
    box-shadow: 0 12px 32px rgba(10,186,181,0.25);
  }
  .split-left .label {
    font-size: 11px; opacity: 0.85; text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 600; margin-bottom: 12px;
  }
  .split-left .big {
    font-size: 88px; font-weight: 800; letter-spacing: -3px; line-height: 0.95;
  }
  .split-left .big .unit { font-size: 22px; font-weight: 500; opacity: 0.85; margin-left: 8px; }
  .split-left .days {
    font-size: 13px; opacity: 0.85; margin-top: 12px;
  }
  .split-left .days b { font-weight: 700; opacity: 1; }

  .split-right {
    padding: 22px 24px;
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .goal-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 14px; border-radius: 10px;
    background: var(--surface2);
    border-left: 3px solid var(--text3);
  }
  .goal-row.active.tier-low { border-left-color: var(--warn); background: rgba(243,156,18,0.06); }
  .goal-row.active.tier-mid { border-left-color: var(--accent); background: var(--accent-soft); }
  .goal-row.active.tier-top { border-left-color: var(--good); background: rgba(19,194,150,0.08); }
  .goal-row .label { font-size: 12px; color: var(--text2); font-weight: 600; }
  .goal-row .label small { color: var(--text3); margin-left: 6px; font-weight: 500; }
  .goal-row .v { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .split-right .pace-text { font-size: 12px; color: var(--text2); margin-top: 6px; line-height: 1.5; }
  .split-right .pace-text b { color: var(--text); }

  /* TIER strip */
  .tier-strip {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
  }
  .tier-card {
    padding: 18px 22px;
    display: flex; align-items: center; gap: 16px;
    transition: border-color .2s, transform .2s;
  }
  .tier-card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 18px rgba(10,186,181,0.12);
  }
  .tier-card .reward {
    font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1;
  }
  .tier-card.top .reward { color: var(--accent); }
  .tier-card .reward .currency { font-size: 14px; font-weight: 500; color: var(--text3); margin-left: 4px; }
  .tier-card .info { flex: 1; }
  .tier-card .when { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .tier-card .desc-short { font-size: 12px; color: var(--text2); }

  /* Motto */
  .motto { padding: 24px; text-align: center; margin-bottom: 16px; }
  .motto .quote { font-size: 20px; font-weight: 600; line-height: 1.4; }
  .motto .quote .accent { color: var(--accent); }

  /* Rules */
  .rules { padding: 22px 24px; }
  .rules h3 {
    font-size: 11px; color: var(--text3); text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 600; margin-bottom: 12px;
  }
  .rules ul { list-style: none; }
  .rules li {
    padding: 9px 0; border-top: 1px solid var(--border);
    font-size: 13px; color: var(--text); line-height: 1.55; display: flex; gap: 10px;
  }
  .rules li:first-child { border-top: 0; }
  .rules li .num { color: var(--accent); font-weight: 700; flex-shrink: 0; min-width: 14px; }

  @media (max-width: 720px) {
    .header h1 { font-size: 22px; letter-spacing: -0.5px; }
    .split { grid-template-columns: 1fr; }
    .split-left .big { font-size: 60px; letter-spacing: -2px; }
    .tier-strip { grid-template-columns: 1fr; }
    .tier-card .reward { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="topbar">
    <div class="topbar-left">
      <a href="may-goal.html" class="back-link">← Все варианты</a>
      <div class="brand">V7 <span class="accent">Padel</span></div>
    </div>
    <div class="topbar-right">
      <div class="theme-switcher"><button data-theme-btn="light" class="active">☀</button><button data-theme-btn="dark">☾</button></div>
      <div class="lang-switcher"><button data-lang="en" class="active">EN</button><button data-lang="ru">RU</button><button data-lang="tr">TR</button></div>
    </div>
  </div>

  <div class="header">
    <span class="pill" data-i18n="pill"></span>
    <h1 data-i18n-html="title"></h1>
    <p class="sub" data-i18n="sub"></p>
  </div>

  <!-- SPLIT: left current, right goals -->
  <div class="split">
    <div class="card split-left">
      <div class="label" data-i18n="progressLabel">Current</div>
      <div class="big" id="big-avg">—<span class="unit" data-i18n="hourPerDay">h/day</span></div>
      <div class="days" id="days-info">—</div>
    </div>
    <div class="card split-right">
      <div class="goal-row" id="row-38">
        <div class="label"><span data-i18n="bar38">38 h · bonus</span></div>
        <div class="v">10K ₺</div>
      </div>
      <div class="goal-row" id="row-40">
        <div class="label"><span data-i18n="bar40">40 h · goal</span></div>
        <div class="v">20K ₺</div>
      </div>
      <div class="pace-text" id="pace-text">—</div>
    </div>
  </div>

  <!-- Tiers strip -->
  <div class="tier-strip">
    <div class="card tier-card" id="tier-card-low">
      <div class="reward">10K<span class="currency">₺</span></div>
      <div class="info">
        <div class="when" data-i18n="lowWhen">38 — 39.9 h/day</div>
        <div class="desc-short" data-i18n="lowDescShort">better than April</div>
      </div>
    </div>
    <div class="card tier-card top" id="tier-card-top">
      <div class="reward">20K<span class="currency">₺</span></div>
      <div class="info">
        <div class="when" data-i18n="topWhen">40+ h/day</div>
        <div class="desc-short" data-i18n="topDescShort">the goal</div>
      </div>
    </div>
  </div>

  <div class="card motto">
    <div class="quote" data-i18n-html="motto"></div>
  </div>

  <div class="card rules">
    <h3 data-i18n="rulesTitle">Rules</h3>
    <ul>
      <li><span class="num">1</span><span data-i18n-html="r1"></span></li>
      <li><span class="num">2</span><span data-i18n-html="r2"></span></li>
      <li><span class="num">3</span><span data-i18n-html="r3"></span></li>
      <li><span class="num">4</span><span data-i18n-html="r4"></span></li>
      <li><span class="num">5</span><span data-i18n="r5"></span></li>
    </ul>
  </div>

  <p class="footer-note">
    <span data-i18n="updated">Updated</span>: <span id="updated-at">—</span> ·
    <a href="dashboard.html" data-i18n="dashLink">internal dashboard</a>
  </p>

</div>

<script src="assets/data.js?v=20260427d"></script>
<script src="assets/may-goal-shared.js?v=20260427d"></script>
<script>
(async function() {
  await window._mgLoadData();
  window._renderState = function() {
    var s = window._mgState, T = window._mgT, TPL = window._mgTpl, C = window._mgConfig;

    document.getElementById('big-avg').innerHTML =
      (s.mode === 'pre' ? '0' : s.avg.toFixed(1)) + '<span class="unit">' + T('hourPerDay') + '</span>';

    if (s.mode === 'pre') {
      var d = Math.max(1, Math.ceil((new Date(new Date().getFullYear(), 4, 1) - new Date()) / 86400000));
      document.getElementById('days-info').innerHTML = '<b>' + TPL('daysToStart', [d]) + '</b>';
    } else {
      document.getElementById('days-info').innerHTML = '<b>' + TPL('daysPlayedTpl', [s.days, s.daysLeft]) + '</b>';
    }

    var tier = window._mgTier(s.avg);
    document.getElementById('row-38').className = 'goal-row';
    document.getElementById('row-40').className = 'goal-row';
    document.getElementById('tier-card-low').classList.remove('active');
    document.getElementById('tier-card-top').classList.remove('active');
    if (tier === 'top') {
      document.getElementById('row-40').classList.add('active', 'tier-top');
      document.getElementById('tier-card-top').classList.add('active');
    } else if (tier === 'mid') {
      document.getElementById('row-38').classList.add('active', 'tier-mid');
      document.getElementById('tier-card-low').classList.add('active');
    }

    var pace40 = window._mgPace(C.TARGET_HOURS);
    var pace38 = window._mgPace(C.LOW_HOURS);
    var paceTxt = '<b>' + pace40 + '</b> ' + T('paceExtra') + ' → 40h · <b>' + pace38 + '</b> → 38h';
    if (s.mode === 'pre') paceTxt = '<b>' + pace40 + '</b> ' + T('paceExtra');
    document.getElementById('pace-text').innerHTML = paceTxt;

    var u = document.getElementById('updated-at');
    if (u) u.textContent = new Date().toLocaleString();
  };
  window._renderState();
})();
</script>
</body>
</html>
