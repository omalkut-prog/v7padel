<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="assets/auth-guard.js"></script>
<title>V7 Padel — Admin KPI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="assets/theme.js"></script>
<link rel="stylesheet" href="assets/theme.css?v=20260418">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#FFF7E8;color:#303030;font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
  nav{position:sticky;top:0;z-index:100;height:56px;background:#303030;display:flex;align-items:center;padding:0 32px;gap:12px}
  .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:#fff;text-decoration:none;margin-right:auto}
  .nav-logo .padel{color:#E5FF2B}
  .nav-role{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:rgba(229,255,43,0.15);border:1px solid rgba(229,255,43,0.3);color:#E5FF2B;padding:4px 12px;border-radius:20px}
  .nav-logout{padding:6px 16px;background:transparent;border:1px solid rgba(255,255,255,0.3);border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;transition:all .2s}
  .nav-logout:hover{border-color:rgba(255,255,255,0.7);color:#fff}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center}
  .emoji{font-size:72px;line-height:1;margin-bottom:24px}
  .page-title{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:1px;color:#303030;margin-bottom:12px}
  .wip{font-size:18px;font-weight:500;color:#303030;margin-bottom:8px}
  .wip-sub{font-size:14px;font-weight:300;color:#888;margin-bottom:40px}
  .btn-back{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;background:#303030;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;text-decoration:none;transition:background .2s}
  .btn-back:hover{background:#444}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="admin-dashboard.html">V7 <span class="padel">PADEL</span></a>
  <span class="nav-role" id="nav-role">Administrator</span>
  <button class="nav-logout" id="nav-logout" onclick="sessionStorage.clear();location.href='login.html'">Sign out</button>
</nav>
<main>
  <div class="emoji">📊</div>
  <h1 class="page-title" id="page-title">My KPI</h1>
  <p class="wip" id="wip-text">Section under development 🚧</p>
  <p class="wip-sub" id="wip-sub">Content coming soon</p>
  <a class="btn-back" href="admin-dashboard.html" id="btn-back">← Back</a>
</main>
<script>
var T={ru:{role:'Администратор',logout:'Выйти',title:'Мои KPI',wip:'Раздел в разработке 🚧',sub:'Скоро здесь появится контент',back:'← Назад'},en:{role:'Administrator',logout:'Sign out',title:'My KPI',wip:'Section under development 🚧',sub:'Content coming soon',back:'← Back'},tr:{role:'Yönetici',logout:'Çıkış',title:"KPI'm",wip:'Bölüm geliştiriliyor 🚧',sub:'İçerik yakında eklenecek',back:'← Geri'}};
var l=sessionStorage.getItem('v7lang')||'en';if(!T[l])l='en';var s=T[l];
document.getElementById('nav-role').textContent=s.role;document.getElementById('nav-logout').textContent=s.logout;document.getElementById('page-title').textContent=s.title;document.getElementById('wip-text').textContent=s.wip;document.getElementById('wip-sub').textContent=s.sub;document.getElementById('btn-back').textContent=s.back;
</script>
</body>
</html>
